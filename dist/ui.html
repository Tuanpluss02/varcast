<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
        font-size: 12px;
        margin: 0;
        padding: 16px;
      }
      button {
        font-size: 12px;
        padding: 8px 16px;
        border-radius: 6px;
        border: 1px solid #ccc;
        background: #18a0fb;
        color: #fff;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #status {
        margin-top: 12px;
        color: #555;
        white-space: pre-wrap;
      }
      .err {
        color: #c00;
      }
    </style>
  </head>
  <body>
    <h3 style="margin: 0 0 12px">Figma → Flutter Design System</h3>
    <button id="export">Export Design System</button>
    <div id="status"></div>
    <script>
      const status = document.getElementById('status');
      const btn = document.getElementById('export');

      btn.onclick = () => {
        btn.disabled = true;
        status.className = '';
        status.textContent = 'Reading design tokens…';
        parent.postMessage({ pluginMessage: { type: 'export' } }, '*');
      };

      window.onmessage = (e) => {
        const msg = e.data.pluginMessage;
        if (!msg) return;
        btn.disabled = false;
        if (msg.type === 'done') {
          status.textContent = '✓ Done — IR logged to console.';
        } else if (msg.type === 'error') {
          status.className = 'err';
          status.textContent = '✗ Error: ' + msg.message;
        }
      };
    </script>
  </body>
</html>
