<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
        font-size: 12px;
        margin: 0;
        padding: 14px 16px 16px;
      }
      h3 {
        margin: 0 0 12px;
        font-size: 13px;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .col {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .label {
        color: #444;
        font-size: 11px;
        margin-bottom: 4px;
      }
      input[type='text'] {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #ddd;
        outline: none;
      }
      input[type='text']:focus {
        border-color: #18a0fb;
      }
      button {
        font-size: 12px;
        padding: 8px 16px;
        border-radius: 6px;
        border: 1px solid #ccc;
        background: #18a0fb;
        color: #fff;
        cursor: pointer;
      }
      button.secondary {
        background: #fff;
        color: #111;
      }
      button.danger {
        background: #e5484d;
        border-color: #d64045;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #status {
        margin-top: 12px;
        color: #555;
        white-space: pre-wrap;
      }
      .err {
        color: #c00;
      }
      .card {
        border: 1px solid #eee;
        border-radius: 10px;
        padding: 10px 12px;
        background: #fff;
      }
      .muted {
        color: #666;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
      }
      .hidden {
        display: none;
      }
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .modal {
        width: 100%;
        max-width: 520px;
        background: #fff;
        border-radius: 12px;
        border: 1px solid #eee;
        box-shadow: 0 10px 35px rgba(0, 0, 0, 0.2);
        overflow: hidden;
      }
      .modal header {
        padding: 10px 12px;
        border-bottom: 1px solid #eee;
        font-weight: 600;
      }
      .modal .body {
        padding: 12px;
      }
      .modal pre {
        margin: 0;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h3>Varcast</h3>

    <div id="screen-home" class="col">
      <div>
        <div class="label">Output path (optional)</div>
        <div class="row">
          <input id="outputPath" type="text" placeholder="Download ZIP instead (default)" />
          <button id="browse" class="secondary" disabled>Browse</button>
        </div>
        <div class="muted" style="margin-top: 6px">
          Note: Figma plugins can’t write to your filesystem directly. This field is kept for parity with the CLI.
        </div>
      </div>
      <div class="row">
        <button id="export">Export</button>
        <button id="regen" class="secondary">Re-generate</button>
      </div>
      <div id="status" class="muted"></div>
    </div>

    <div id="screen-validating" class="hidden">
      <div class="card">
        <div style="font-weight: 600">Validating</div>
        <div class="muted" style="margin-top: 6px">Reading design tokens…</div>
      </div>
    </div>

    <div id="screen-errors" class="hidden">
      <div class="card">
        <div class="err" style="font-weight: 700" id="errTitle">✗ Errors</div>
        <div class="mono" id="errList" style="margin-top: 10px"></div>
        <div class="row" style="margin-top: 12px">
          <button id="closeErrors" class="danger">Close</button>
        </div>
      </div>
    </div>

    <div id="screen-warnings" class="hidden">
      <div class="card">
        <div style="font-weight: 700">⚠ Warnings (auto-fixed)</div>
        <div class="mono" id="warnList" style="margin-top: 10px"></div>
        <div class="row" style="margin-top: 12px">
          <button id="cancelWarnings" class="secondary">Cancel</button>
          <button id="continueWarnings">Continue Anyway</button>
        </div>
      </div>
    </div>

    <div id="screen-ready" class="hidden">
      <div class="card">
        <div style="font-weight: 700">Ready to export</div>
        <div class="mono" id="summary" style="margin-top: 10px"></div>
        <div class="mono" id="diffSummary" style="margin-top: 10px"></div>
        <div class="row" style="margin-top: 12px">
          <button id="downloadZip">Download ZIP</button>
          <button id="viewChangelog" class="secondary">View Changelog</button>
        </div>
      </div>
    </div>

    <div id="screen-exporting" class="hidden">
      <div class="card">
        <div style="font-weight: 700">Exporting…</div>
        <div class="muted" style="margin-top: 6px">Building ZIP package…</div>
      </div>
    </div>

    <div id="screen-done" class="hidden">
      <div class="card">
        <div style="font-weight: 700">✓ Export complete</div>
        <div class="mono" id="doneSummary" style="margin-top: 10px"></div>
        <div class="row" style="margin-top: 12px">
          <button id="downloadZipAgain">Download ZIP</button>
          <button id="viewChangelogDone" class="secondary">View Changelog</button>
        </div>
      </div>
    </div>

    <div id="modalBackdrop" class="modal-backdrop">
      <div class="modal">
        <header>Changelog</header>
        <div class="body">
          <pre id="changelogText" class="mono"></pre>
          <div class="row" style="margin-top: 12px; justify-content: flex-end">
            <button id="closeModal" class="secondary">Close</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const status = document.getElementById('status');
      const btn = document.getElementById('export');
      const regenBtn = document.getElementById('regen');

      const screens = {
        home: document.getElementById('screen-home'),
        validating: document.getElementById('screen-validating'),
        errors: document.getElementById('screen-errors'),
        warnings: document.getElementById('screen-warnings'),
        ready: document.getElementById('screen-ready'),
        exporting: document.getElementById('screen-exporting'),
        done: document.getElementById('screen-done'),
      };

      const errTitle = document.getElementById('errTitle');
      const errList = document.getElementById('errList');
      const warnList = document.getElementById('warnList');
      const summary = document.getElementById('summary');
      const diffSummary = document.getElementById('diffSummary');
      const doneSummary = document.getElementById('doneSummary');

      const modalBackdrop = document.getElementById('modalBackdrop');
      const changelogText = document.getElementById('changelogText');

      let lastZip = null;
      let lastFilename = 'design_system.zip';
      let lastChangelog = '';
      let lastDiff = { added: [], removed: [], renamed: [] };
      let lastSummary = null;

      function show(name) {
        Object.values(screens).forEach((el) => el.classList.add('hidden'));
        screens[name].classList.remove('hidden');
      }

      function fmtDiff(diff) {
        const added = diff.added?.length ?? 0;
        const removed = diff.removed?.length ?? 0;
        const renamed = diff.renamed?.length ?? 0;
        return `Changes:\n- added: ${added}\n- removed: ${removed}\n- renamed (Figma only): ${renamed}`;
      }

      function fmtSummary(s) {
        if (!s) return '';
        return `${s.collections} collections · ${s.variables} variables · ${s.composites} composites\n${s.fileCount} generated files`;
      }

      btn.onclick = () => {
        btn.disabled = true;
        regenBtn.disabled = true;
        status.className = '';
        status.textContent = '';
        show('validating');
        parent.postMessage({ pluginMessage: { type: 'export' } }, '*');
      };

      regenBtn.onclick = btn.onclick;

      document.getElementById('closeErrors').onclick = () => {
        parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
      };
      document.getElementById('cancelWarnings').onclick = () => {
        parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
      };
      document.getElementById('continueWarnings').onclick = () => {
        show('ready');
        parent.postMessage({ pluginMessage: { type: 'continue' } }, '*');
      };

      function openModal() {
        changelogText.textContent = lastChangelog || 'No changelog yet.';
        modalBackdrop.style.display = 'flex';
      }
      function closeModal() {
        modalBackdrop.style.display = 'none';
      }
      document.getElementById('closeModal').onclick = closeModal;
      modalBackdrop.addEventListener('click', (e) => {
        if (e.target === modalBackdrop) closeModal();
      });

      document.getElementById('viewChangelog').onclick = openModal;
      document.getElementById('viewChangelogDone').onclick = openModal;

      function downloadZip() {
        if (!lastZip) return;
        const blob = new Blob([lastZip], { type: 'application/zip' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = lastFilename;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      }
      document.getElementById('downloadZip').onclick = () => {
        show('exporting');
        parent.postMessage({ pluginMessage: { type: 'download-zip' } }, '*');
      };
      document.getElementById('downloadZipAgain').onclick = downloadZip;

      window.onmessage = (e) => {
        const msg = e.data.pluginMessage;
        if (!msg) return;
        btn.disabled = false;
        regenBtn.disabled = false;
        if (msg.type === 'validating') {
          show('validating');
        } else if (msg.type === 'validation-errors') {
          const errs = msg.errors || [];
          errTitle.textContent = `✗ ${errs.length} errors found — fix in Figma before exporting`;
          errList.textContent = errs
            .map((e) => `${e.type}: ${(e.path || []).join(' → ')}`)
            .join('\n');
          show('errors');
        } else if (msg.type === 'validation-warnings') {
          const ws = msg.warnings || [];
          warnList.textContent = ws
            .map((w) => `${w.type}: ${(w.path || []).join(' → ')}`)
            .join('\n');
          lastDiff = msg.diff || lastDiff;
          diffSummary.textContent = fmtDiff(lastDiff);
          show('warnings');
        } else if (msg.type === 'ready') {
          lastDiff = msg.diff || lastDiff;
          lastSummary = msg.summary || lastSummary;
          summary.textContent = fmtSummary(lastSummary);
          diffSummary.textContent = fmtDiff(lastDiff);
          show('ready');
        } else if (msg.type === 'exporting') {
          show('exporting');
        } else if (msg.type === 'zip-ready') {
          lastZip = msg.bytes;
          lastFilename = msg.filename || 'design_system.zip';
          lastChangelog = msg.changelog || '';
          lastDiff = msg.diff || lastDiff;
          lastSummary = msg.summary || lastSummary;

          doneSummary.textContent = fmtSummary(lastSummary) + '\n\n' + fmtDiff(lastDiff);
          show('done');
          downloadZip();
        } else if (msg.type === 'error') {
          show('home');
          status.className = 'err';
          status.textContent = '✗ Error: ' + msg.message;
        }
      };

      // initial
      show('home');
    </script>
  </body>
</html>
